services:
  postgres:
    image: postgres:15-alpine
    container_name: threatsense-db
    environment:
      POSTGRES_USER: threatsense
      POSTGRES_PASSWORD: threatsense_password
      POSTGRES_DB: threatsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: threatsense-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: threatsense-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build: ./apps/api
    container_name: threatsense-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://threatsense:threatsense_password@postgres:5432/threatsense
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    command: >
      bash -lc "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./apps/worker
    container_name: threatsense-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://threatsense:threatsense_password@postgres:5432/threatsense
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@threatsense.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/worker
      - ./apps/api/app/models.py:/worker/api_models_src.py:ro

  web:
    image: node:20-alpine
    container_name: threatsense-web
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    depends_on:
      - api

volumes:
  postgres_data:
  web_node_modules:
