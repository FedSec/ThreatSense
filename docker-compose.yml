services:
  postgres:
    image: postgres:15-alpine
    container_name: threatsense-db
    environment:
      POSTGRES_USER: threatsense
      POSTGRES_PASSWORD: threatsense_password
      POSTGRES_DB: threatsense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: threatsense-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: threatsense-mailpit

  api:
    build: ./apps/api
    container_name: threatsense-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://threatsense:threatsense_password@postgres:5432/threatsense
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      FRONTEND_URL: http://localhost:13000
      ALLOWED_ORIGINS: http://localhost:13000,http://127.0.0.1:13000,http://localhost:3000,http://127.0.0.1:3000,http://devmad:13000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./apps/api:/app
    working_dir: /app
    command: >
      bash -c "cd /app && alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./apps/worker
    container_name: threatsense-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://threatsense:threatsense_password@postgres:5432/threatsense
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@threatsense.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/worker
      - ./apps/api/app/models.py:/worker/api_models_src.py:ro

  web:
    build:
      context: ./apps/web
      args:
        # Browser uses same-origin /api; Next rewrites proxy to the api service.
        NEXT_PUBLIC_API_BASE: /api
        API_INTERNAL_URL: http://api:8000
    container_name: threatsense-web
    environment:
      NEXT_PUBLIC_API_BASE: /api
      API_INTERNAL_URL: http://api:8000
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "13000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
