version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: threatsense-db
    environment:
      POSTGRES_USER: threatsense
      POSTGRES_PASSWORD: threatsense_password
      POSTGRES_DB: threatsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatsense"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
